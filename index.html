<title>French Group 6 — Class Recordings</title>
<style>
  @font-face{
    font-family: 'Coolvetica';
    src: local('Coolvetica');
  }
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

  :root{
    --bg:#E8FAFE;
    --card-header:#d3f0f9;
    --card-body:#eaf8fc;
    --ink:#10171a;
    --sub:#5b6b6f;
    --accent:#1ba8d6;
    --pill:#10171a;
    --line:#d2e9ee;
    --noclass-bg:#dfe3e4;
    --noclass-text:#8b9598;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    letter-spacing:.01em;
  }
  .title-font{
    font-family:'Coolvetica','Archivo Black',-apple-system,sans-serif;
    font-weight:700;
    letter-spacing:.01em;
    line-height:1.015;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:48px 24px 96px;}

  .brand{display:flex;align-items:center;margin-bottom:56px;}
  .brand img{height:64px;display:block;}

  .eyebrow{
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--sub);margin-bottom:10px;font-weight:600;
  }
  h1{font-size:48px;margin:0 0 12px;letter-spacing:-.01em;}
  .sub{font-size:16px;color:var(--sub);margin:0 0 56px;font-weight:400;}

  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:24px;
  }
  .section-head h2{font-size:26px;margin:0;}
  .curriculum-select{
    display:flex;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--line);border-radius:8px;
    padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink);
    font-family:'Geist',-apple-system,sans-serif;
  }
  .curriculum-select svg{width:12px;height:12px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px;
    margin-bottom:24px;
  }
  @media (max-width: 860px){ .grid{grid-template-columns:1fr;} }

  .card{
    background:var(--card-body);
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .card-header{
    background:var(--card-header);
    padding:18px 22px;
    font-size:20px;
  }
  .card-body{padding:4px 22px 8px;}
  .class-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 0;
    border-bottom:1px solid var(--line);
  }
  .class-row:last-child{border-bottom:none;}
  .class-meta b{display:block;font-size:15px;font-weight:700;margin-bottom:3px;font-family:'Geist',sans-serif;}
  .class-meta span{font-size:13px;color:var(--sub);}
  .listen, .no-class, .not-uploaded{
    display:inline-flex;align-items:center;gap:6px;
    border-radius:999px;
    padding:9px 16px;
    font-size:12.5px;font-weight:700;letter-spacing:.03em;
    text-decoration:none;
    white-space:nowrap;
    flex-shrink:0;
    margin-left:12px;
  }
  .listen{
    background:var(--pill);color:var(--accent);
  }
  .listen:hover{opacity:.85;}
  .no-class{
    background:var(--noclass-bg);color:var(--noclass-text);
    cursor:default;
  }
  .not-uploaded{
    background:#b9c9d6;color:#4a5b6b;
    cursor:default;
  }

  footer{
    margin-top:48px;font-size:12px;color:var(--sub);
  }
</style>
</head>

const WEEKS = [{"week": 1, "classes": [{"label": "Class 1", "date": "24-04-26", "day": "Friday", "url": "https://drive.google.com/file/d/14VJ8iJjZc652JkjwMO1W-X8MlGFXDls3/view?usp=drivesdk"}, {"label": "Class 2", "date": "25-04-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1G0Hm5NLFDdLH66w3S-99N3yDOg4uUT2v/view?usp=drivesdk"}, {"label": "Class 3", "date": "26-04-26", "day": "Sunday", "url": "https://drive.google.com/file/d/1JcLVFSFL_nqeaiN1dgkBGnwReFmNwmmd/view?usp=drivesdk"}]}, {"week": 2, "classes": [{"label": "Class 1", "date": "01-05-26", "day": "Friday", "url": "https://drive.google.com/file/d/1HSna3EWWqSnXU19zoPShxH6JZrcQPpLs/view?usp=drivesdk"}, {"label": "Class 2", "date": "02-05-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1MHyFVdeaq2fF-6RJ3-yDMtTwqs76e0mJ/view?usp=drivesdk"}, {"label": "Class 3", "date": "03-05-26", "day": "Sunday", "url": "https://drive.google.com/file/d/1sJi4czklwPEi76lNzFu2Vihgo0iKkzQ2/view?usp=drivesdk"}]}, {"week": 3, "classes": [{"label": "Class 1", "date": "08-05-26", "day": "Friday", "url": "https://drive.google.com/file/d/15b3kRwqwVvYg94pdvLOWHg4vFOsHjxUc/view?usp=drivesdk"}, {"label": "Class 2", "date": "09-05-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1yv0Bz3vVR1zzaNRtjoGOfkYAPBaOpZR3/view?usp=drivesdk"}, {"label": "Class 3", "date": "10-05-26", "day": "Sunday", "url": "https://drive.google.com/file/d/1XBCJHv0UzxJtpuK4PFs6lc-yAPU_u1Ae/view?usp=drivesdk"}]}, {"week": 4, "classes": [{"label": "Class 1", "date": "15-05-26", "day": "Friday", "url": null, "status": "not_uploaded"}, {"label": "Class 2", "date": "16-05-26", "day": "Saturday", "url": null, "status": "not_uploaded"}, {"label": "Class 3", "date": "17-05-26", "day": "Sunday", "url": "https://drive.google.com/file/d/1glVvEQDfRSMNScAogPpIHFgp2OqGlIN1/view?usp=drivesdk"}]}, {"week": 5, "classes": [{"label": "Class 1", "date": "22-05-26", "day": "Friday", "url": "https://drive.google.com/file/d/18wvdwdEd3LeV5DJKNpikY6ipDlTszxvd/view?usp=drivesdk"}, {"label": "Class 2", "date": "23-05-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1hRZhDvS6nVq7RFhXFxQXm8dsZ4PNqSwQ/view?usp=drivesdk"}, {"label": "Class 3", "date": "24-05-26", "day": "Sunday", "url": "https://drive.google.com/file/d/10mflNXuq2NUXvHUklgT7F4lovuWtm6_R/view?usp=drivesdk"}]}, {"week": 6, "classes": [{"label": "Class 1", "date": "29-05-26", "day": "Friday", "url": null}, {"label": "Class 2", "date": "30-05-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1K1mLwddbUfUk_eXZaRZHuuC166LkiAVq/view?usp=drivesdk"}, {"label": "Class 3", "date": "31-05-26", "day": "Sunday", "url": "https://drive.google.com/file/d/1f5FYaiEA0Wj-1UHHjIfmZeN_ZGwxe_SP/view?usp=drivesdk"}]}, {"week": 7, "classes": [{"label": "Class 1", "date": "05-06-26", "day": "Friday", "url": "https://drive.google.com/file/d/1o1VRQTVa3JY-1fhI2gsyqEPp_6fMq-cV/view?usp=drivesdk"}, {"label": "Class 2", "date": "06-06-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1pVB-8ifo2-tr47ZUr98i3IXecAGCrhED/view?usp=drivesdk"}, {"label": "Class 3", "date": "07-06-26", "day": "Sunday", "url": "https://drive.google.com/file/d/1FjJQYKQU6i5S6D_lm-LM2MBbga7QvUrt/view?usp=drivesdk"}]}, {"week": 8, "classes": [{"label": "Class 1", "date": "12-06-26", "day": "Friday", "url": "https://drive.google.com/file/d/1Gnu86wu7eTUmB_u4vW0jeOnwy5qcoWt2/view?usp=drivesdk"}, {"label": "Class 2", "date": "13-06-26", "day": "Saturday", "url": "https://drive.google.com/file/d/1WP4EMmB_9qFWZZR5SYkyT8LhnZKRV3Wi/view?usp=drivesdk"}, {"label": "Class 3", "date": "14-06-26", "day": "Sunday", "url": null, "status": "not_uploaded"}]}];

const weeksContainer = document.getElementById("weeks");

for (let i = 0; i < WEEKS.length; i += 3) {
  const rowWeeks = WEEKS.slice(i, i + 3);
  const grid = document.createElement("div");
  grid.className = "grid";

  rowWeeks.forEach(w => {
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header title-font";
    header.textContent = "Week " + w.week;
    card.appendChild(header);

    const body = document.createElement("div");
    body.className = "card-body";

    w.classes.forEach(c => {
      const row = document.createElement("div");
      row.className = "class-row";
      const action = c.url
        ? `<a class="listen" href="${c.url}" target="_blank" rel="noopener noreferrer">LISTEN &#8599;</a>`
        : (c.status === "not_uploaded"
            ? `<span class="not-uploaded">NOT UPLOADED</span>`
            : `<span class="no-class">NO CLASS</span>`);
      row.innerHTML = `
        <div class="class-meta">
          <b>${c.label}</b>
          <span>${c.date} | ${c.day}</span>
        </div>
        ${action}
      `;
      body.appendChild(row);
    });

    card.appendChild(body);
    grid.appendChild(card);
  });

  weeksContainer.appendChild(grid);
}

document.getElementById("updated").textContent = new Date().toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
